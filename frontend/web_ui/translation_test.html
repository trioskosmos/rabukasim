<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translation System Test</title>
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .header h1 { margin: 0; }
        .header p { margin: 10px 0 0 0; opacity: 0.9; }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-en {
            background: #4CAF50;
            color: white;
        }
        .btn-en:hover { background: #45a049; }
        .btn-jp {
            background: #ff6b6b;
            color: white;
        }
        .btn-jp:hover { background: #ee5a52; }
        
        .test-section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .test-section h2 {
            margin-top: 0;
            color: #667eea;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .test-item {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 20px;
            padding: 10px;
            margin: 10px 0;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
        }
        .test-label {
            font-weight: bold;
            color: #333;
        }
        .test-value {
            font-family: 'Courier New', monospace;
            color: #667eea;
        }
        
        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        .status.ok {
            background: #4CAF50;
            color: white;
        }
        .status.error {
            background: #f44336;
            color: white;
        }
        .status.loading {
            background: #ff9800;
            color: white;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .info-box code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌐 Translation System Test</h1>
        <p>Verify bidirectional language support is working correctly</p>
    </div>

    <div class="controls">
        <button class="btn-en" onclick="switchLanguage('en')">🇺🇸 Switch to English</button>
        <button class="btn-jp" onclick="switchLanguage('jp')">🇯🇵 Switch to Japanese</button>
        <button onclick="testTranslations()">🧪 Run Tests</button>
    </div>

    <div class="info-box">
        <strong>Current Language:</strong> <span id="current-lang" style="font-weight: bold; color: #2196F3;">-</span>
        <br>
        <strong>Instructions:</strong> Click "Switch to English/Japanese" button above, then click "Run Tests" to verify translations are applied correctly.
    </div>

    <div id="test-results"></div>

    <script type="module">
        import * as i18n from './web_ui/js/i18n/index.js';
        
        // Expose to global scope for testing
        window.i18n = i18n;
        window.testI18n = {
            loaded: false,
            currentLang: 'jp'
        };

        // Initialize
        async function init() {
            await i18n.loadTranslations('jp');
            window.testI18n.loaded = true;
            updateDisplay();
        }

        window.switchLanguage = async function(lang) {
            console.log(`Switching to: ${lang}`);
            await i18n.loadTranslations(lang);
            window.testI18n.currentLang = lang;
            localStorage.setItem('lovelive_lang', lang);
            updateDisplay();
        }

        function updateDisplay() {
            const langDisplay = document.getElementById('current-lang');
            const lang = window.testI18n.currentLang;
            langDisplay.textContent = lang === 'en' ? '🇺🇸 English' : '🇯🇵 Japanese';
            langDisplay.style.color = lang === 'en' ? '#4CAF50' : '#ff6b6b';
        }

        window.testTranslations = async function() {
            if (!window.testI18n.loaded) {
                alert('i18n not loaded. Retrying...');
                await init();
                return;
            }

            const resultsDiv = document.getElementById('test-results');
            const lang = window.testI18n.currentLang;
            let html = '';

            // Test Card Types
            html += '<div class="test-section">';
            html += '<h2>Card Type Translations</h2>';
            const cardTypes = ['メンバー', 'ライブ', 'エネルギー'];
            for (const type of cardTypes) {
                const translated = i18n.translateCardType(type);
                const expected = lang === 'en' ? 
                    (type === 'メンバー' ? 'Member' : type === 'ライブ' ? 'Live' : 'Energy') :
                    type;
                const isCorrect = translated === expected;
                html += `
                    <div class="test-item">
                        <div class="test-label">${type}</div>
                        <div>
                            <span class="test-value">${translated}</span>
                            <span class="status ${isCorrect ? 'ok' : 'error'}">
                                ${isCorrect ? '✓ PASS' : '✗ FAIL'}
                            </span>
                        </div>
                    </div>
                `;
            }
            html += '</div>';

            // Test Products
            html += '<div class="test-section">';
            html += '<h2>Product Name Translations</h2>';
            const products = ['スタートデッキラブライブ！', 'ブースターパック', 'PRカード'];
            for (const prod of products) {
                const translated = i18n.translateProduct(prod);
                const hasTranslation = translated !== prod;
                html += `
                    <div class="test-item">
                        <div class="test-label">${prod}</div>
                        <div>
                            <span class="test-value">${translated}</span>
                            <span class="status ${lang === 'en' && hasTranslation ? 'ok' : lang === 'jp' ? 'ok' : 'error'}">
                                ${lang === 'en' ? (hasTranslation ? '✓ TRANSLATED' : '? TBD') : '✓ JP'}
                            </span>
                        </div>
                    </div>
                `;
            }
            html += '</div>';

            // Test Series
            html += '<div class="test-section">';
            html += '<h2>Series Name Translations</h2>';
            const series = ['ラブライブ！', 'ラブライブ！サンシャイン!!', 'ラブライブ！虹ヶ咲学園スクールアイドル同好会'];
            for (const ser of series) {
                const translated = i18n.translateSeries(ser);
                const hasTranslation = translated !== ser;
                html += `
                    <div class="test-item">
                        <div class="test-label">${ser}</div>
                        <div>
                            <span class="test-value">${translated}</span>
                            <span class="status ${lang === 'en' && hasTranslation ? 'ok' : lang === 'jp' ? 'ok' : 'error'}">
                                ${lang === 'en' ? (hasTranslation ? '✓ TRANSLATED' : '? TBD') : '✓ JP'}
                            </span>
                        </div>
                    </div>
                `;
            }
            html += '</div>';

            // Test Character Names
            html += '<div class="test-section">';
            html += '<h2>Character Name Translations (sample)</h2>';
            const chars = ['高坂 穂乃果', '澁谷 かのん', '高海 千歌'];
            for (const char of chars) {
                const translated = i18n.translateCard({ name: char });
                const displayName = translated.name || char;
                const hasTranslation = displayName !== char;
                html += `
                    <div class="test-item">
                        <div class="test-label">${char}</div>
                        <div>
                            <span class="test-value">${displayName}</span>
                            <span class="status ${lang === 'en' && hasTranslation ? 'ok' : lang === 'jp' ? 'ok' : 'error'}">
                                ${lang === 'en' ? (hasTranslation ? '✓ TRANSLATED' : '✗ NOT IN MAP') : '✓ JP'}
                            </span>
                        </div>
                    </div>
                `;
            }
            html += '</div>';

            // System Status
            html += '<div class="test-section" style="border-top: 3px solid #667eea;">';
            html += '<h2>System Status</h2>';
            html += `
                <div class="test-item">
                    <div class="test-label">i18n Module</div>
                    <div>
                        <span class="test-value">Loaded</span>
                        <span class="status ok">✓ OK</span>
                    </div>
                </div>
                <div class="test-item">
                    <div class="test-label">Translation Functions</div>
                    <div>
                        <span class="test-value">
                            translateCard, translateCardType, translateProduct, translateSeries
                        </span>
                        <span class="status ok">✓ OK</span>
                    </div>
                </div>
                <div class="test-item">
                    <div class="test-label">localStorage</div>
                    <div>
                        <span class="test-value">lovelive_lang = "${lang}"</span>
                        <span class="status ok">✓ OK</span>
                    </div>
                </div>
            `;
            html += '</div>';

            resultsDiv.innerHTML = html;
            console.log('Tests completed for language:', lang);
        }

        // Initialize on load
        init().catch(err => {
            console.error('Failed to initialize:', err);
            document.getElementById('test-results').innerHTML = `
                <div class="test-section">
                    <p style="color: red;">❌ Failed to load translation system. Check console for errors.</p>
                </div>
            `;
        });
    </script>
</body>
</html>
