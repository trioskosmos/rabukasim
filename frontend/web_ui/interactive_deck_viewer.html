<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Viewer (Interactive)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #ff6b9d, #c44dff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            max-width: 900px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls h3 {
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #aaa;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            color: #ddd;
            padding: 8px;
            border-radius: 8px;
            resize: vertical;
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(90deg, #ff6b9d, #c44dff);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: transform 0.1s;
        }

        button:hover {
            transform: scale(1.04);
        }

        .format-hint {
            font-size: 0.75rem;
            color: #888;
        }

        /* Stats bar */
        .stats-bar {
            max-width: 900px;
            margin: 0 auto 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .stat-item {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .stat-label {
            color: #aaa;
        }

        .stat-val {
            font-weight: bold;
            color: #ff6b9d;
        }

        .stat-val.ok {
            color: #2ecc71;
        }

        .stat-val.warn {
            color: #f1c40f;
        }

        /* Section headers */
        .section-header {
            max-width: 900px;
            margin: 0 auto 10px;
            font-size: 1rem;
            font-weight: bold;
            padding: 6px 10px;
            background: rgba(255, 107, 157, 0.12);
            border-left: 3px solid #ff6b9d;
            border-radius: 4px;
            color: #ff6b9d;
        }

        .section-header.energy {
            background: rgba(255, 152, 0, 0.1);
            border-left-color: #FF9800;
            color: #FF9800;
        }

        /* Card grid — compact */
        .deck-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 6px;
            max-width: 900px;
            margin: 0 auto 16px;
        }

        .card-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 5px;
            text-align: center;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            position: relative;
        }

        .card-item:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 8px 24px rgba(196, 77, 255, 0.35);
            z-index: 2;
        }

        .card-item img {
            width: 100%;
            border-radius: 4px;
            margin-bottom: 4px;
            aspect-ratio: 219/306;
            object-fit: cover;
            background: #111;
            display: block;
        }

        .card-qty-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.75);
            color: #ff6b9d;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 1px 5px;
            border-radius: 10px;
            line-height: 1.4;
        }

        .card-code {
            font-size: 0.55rem;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Unknown card placeholder */
        .card-placeholder {
            aspect-ratio: 219/306;
            background: #222;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 4px;
        }

        .error-box {
            max-width: 900px;
            margin: 0 auto;
            padding: 12px;
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.4);
            border-radius: 8px;
            font-size: 0.85rem;
            color: #e74c3c;
        }

        #results {
            max-width: 900px;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <h1>Deck Viewer (DECK LOG Paste)</h1>

    <div class="controls">
        <h3>Paste DECK LOG HTML here (full page source or deck section):</h3>
        <textarea id="deckInput" placeholder="Paste the full HTML source of a DECK LOG view page here..."></textarea>
        <div class="btn-row">
            <button onclick="parseAndRender()">Visualize Deck</button>
            <button onclick="clearAll()" style="background: rgba(255,255,255,0.1);">Clear</button>
            <span class="format-hint">Supports: Bushiroad DECK LOG HTML · Text format (ID x N / N x ID)</span>
        </div>
    </div>

    <div id="stats-bar" class="stats-bar" style="display:none;"></div>
    <div id="results"></div>

    <script>
        let cardsDb = {};

        async function init() {
            try {
                const response = await fetch('data/cards.json');
                cardsDb = await response.json();
                console.log("Card DB Loaded:", Object.keys(cardsDb).length, "cards");
            } catch (e) {
                console.warn("Could not load local data/cards.json. Cards will show placeholder images.", e);
            }
        }
        init();

        function clearAll() {
            document.getElementById('deckInput').value = '';
            document.getElementById('results').innerHTML = '';
            document.getElementById('stats-bar').style.display = 'none';
        }

        // ── Parsers ──────────────────────────────────────────────────────────

        /**
         * Returns { main: {id: qty}, energy: {id: qty}, deckName: str } from HTML.
         * Splits by <h3>メインデッキ</h3> and <h3>エネルギーデッキ</h3> headings.
         */
        function parseDeckLogHTML(html) {
            // Extract deck name from <h2>デッキ名「...」のデッキ</h2>
            const nameMatch = html.match(/デッキ名「([^」]+)」/);
            const deckName = nameMatch ? nameMatch[1] : '';

            // Split into sections by h3 headings
            // We look for the deckview div content
            const mainSection = extractAfterH3(html, 'メインデッキ');
            const energySection = extractAfterH3(html, 'エネルギーデッキ');

            const main = parseCardSection(mainSection);
            const energy = parseCardSection(energySection);

            // If section splitting failed, fall back to flat parse (no energy separation)
            if (Object.keys(main).length === 0 && Object.keys(energy).length === 0) {
                const all = parseCardSection(html);
                return { main: all, energy: {}, deckName, fallback: true };
            }

            return { main, energy, deckName, fallback: false };
        }

        /**
         * Returns the HTML content that belongs to the section starting after a given h3 heading
         * and ending before the next h3 (or end of string).
         */
        function extractAfterH3(html, heading) {
            const re = new RegExp(`<h3[^>]*>\\s*${escapeRegex(heading)}\\s*<\\/h3>([\\s\\S]*?)(?=<h3|$)`, 'i');
            const m = html.match(re);
            return m ? m[1] : '';
        }

        function escapeRegex(s) {
            return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        /**
         * Extracts { cardId: qty } from a section of HTML or text.
         * Pattern: title="CARD_ID : Card Name" ... <span class="num">N</span>
         */
        function parseCardSection(content) {
            if (!content) return {};
            const result = {};

            // Primary: DECK LOG HTML format
            const htmlRe = /title="([^"]+?)\s*:\s*[^"]*"[\s\S]*?<span[^>]*class="num"[^>]*>(\d+)<\/span>/g;
            let m;
            while ((m = htmlRe.exec(content)) !== null) {
                const id = m[1].trim();
                const qty = parseInt(m[2], 10);
                result[id] = (result[id] || 0) + qty;
            }

            if (Object.keys(result).length > 0) return result;

            // Fallback: text format  "N x ID"  or  "ID x N"
            const textRe1 = /(\d+)\s*[xX×]\s*([A-Za-z0-9!+\-＋＝]+(?:[－\-][A-Za-z0-9!+＋＝]+)*)/g;
            while ((m = textRe1.exec(content)) !== null) {
                const qty = parseInt(m[1]);
                const id = m[2].trim();
                if (id.length > 3) result[id] = (result[id] || 0) + qty;
            }
            if (Object.keys(result).length > 0) return result;

            const textRe2 = /([A-Za-z0-9!+\-＋＝]+(?:[－\-][A-Za-z0-9!+＋＝]+)*)\s*[xX×]\s*(\d+)/g;
            while ((m = textRe2.exec(content)) !== null) {
                const id = m[1].trim();
                const qty = parseInt(m[2]);
                if (id.length > 3) result[id] = (result[id] || 0) + qty;
            }

            return result;
        }

        // ── Rendering ─────────────────────────────────────────────────────────

        function parseAndRender() {
            const input = document.getElementById('deckInput').value.trim();
            if (!input) return;

            let parsed;
            if (input.includes('<html') || input.includes('<div') || input.includes('class="num"')) {
                parsed = parseDeckLogHTML(input);
            } else {
                // Plain text mode — treat everything as main deck
                const cards = parseCardSection(input);
                parsed = { main: cards, energy: {}, deckName: '', fallback: true };
            }

            if (Object.keys(parsed.main).length === 0 && Object.keys(parsed.energy).length === 0) {
                document.getElementById('results').innerHTML =
                    `<div class="error-box">⚠️ No cards found. Make sure you paste the full HTML source of the DECK LOG page (Ctrl+U → Ctrl+A → Ctrl+C) or a plain text deck list.</div>`;
                return;
            }

            renderAll(parsed);
        }

        function renderAll({ main, energy, deckName, fallback }) {
            const results = document.getElementById('results');
            results.innerHTML = '';

            const mainCount = Object.values(main).reduce((s, v) => s + v, 0);
            const energyCount = Object.values(energy).reduce((s, v) => s + v, 0);
            const mainUnique = Object.keys(main).length;
            const energyUnique = Object.keys(energy).length;

            // Stats bar
            const statsBar = document.getElementById('stats-bar');
            statsBar.style.display = 'flex';
            const mainOk = mainCount === 60;
            const energyOk = energyCount === 12;
            statsBar.innerHTML = `
                ${deckName ? `<div class="stat-item"><span class="stat-label">Deck:</span><span class="stat-val">${deckName}</span></div>` : ''}
                <div class="stat-item"><span class="stat-label">Main Deck:</span>
                    <span class="stat-val ${mainOk ? 'ok' : 'warn'}">${mainCount} / 60</span>
                    <span class="stat-label">(${mainUnique} unique)</span>
                </div>
                <div class="stat-item"><span class="stat-label">Energy:</span>
                    <span class="stat-val ${energyOk ? 'ok' : energyCount === 0 ? '' : 'warn'}">${energyCount} / 12</span>
                    <span class="stat-label">(${energyUnique} unique)</span>
                </div>
                ${fallback ? `<div class="stat-item" style="color:#f1c40f;font-size:0.75rem;">⚠ Section split failed — showing all cards as main deck</div>` : ''}
            `;

            // Main deck section
            if (Object.keys(main).length > 0) {
                const hdr = document.createElement('div');
                hdr.className = 'section-header';
                hdr.textContent = `メインデッキ — ${mainCount} cards`;
                results.appendChild(hdr);

                const grid = document.createElement('div');
                grid.className = 'deck-grid';
                renderCards(main, grid);
                results.appendChild(grid);
            }

            // Energy deck section
            if (Object.keys(energy).length > 0) {
                const hdr = document.createElement('div');
                hdr.className = 'section-header energy';
                hdr.textContent = `エネルギーデッキ — ${energyCount} cards`;
                results.appendChild(hdr);

                const grid = document.createElement('div');
                grid.className = 'deck-grid';
                renderCards(energy, grid);
                results.appendChild(grid);
            }
        }

        function renderCards(cardMap, grid) {
            const sorted = Object.entries(cardMap).sort(([a], [b]) => a.localeCompare(b));

            for (const [cardId, count] of sorted) {
                // Look up in DB — try as-is, then uppercase
                const card = cardsDb[cardId] || cardsDb[cardId.toUpperCase()] || null;
                const imgSrc = card ? (card._img || card.img || '') : '';
                const cardName = card ? (card.name || cardId) : cardId;

                const item = document.createElement('div');
                item.className = 'card-item';
                item.title = `${cardId}\n${cardName}${count > 1 ? ` ×${count}` : ''}`;

                if (imgSrc) {
                    item.innerHTML = `
                        <img src="${imgSrc}" alt="${cardName}" loading="lazy"
                            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <div class="card-placeholder" style="display:none;">?</div>
                        ${count > 1 ? `<div class="card-qty-badge">×${count}</div>` : ''}
                        <div class="card-code">${cardId}</div>
                    `;
                } else {
                    // No local image — show remote image from title attribute or placeholder
                    item.innerHTML = `
                        <div class="card-placeholder">?</div>
                        ${count > 1 ? `<div class="card-qty-badge">×${count}</div>` : ''}
                        <div class="card-code">${cardId}</div>
                    `;
                }

                grid.appendChild(item);
            }
        }
    </script>
</body>

</html>
