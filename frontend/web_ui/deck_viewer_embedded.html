<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Viewer (Embedded)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(90deg, #ff6b9d, #c44dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats { text-align: center; margin-bottom: 30px; color: #aaa; }
        .deck-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(196, 77, 255, 0.3);
        }
        .card-item img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 8px;
            aspect-ratio: 219/306;
            object-fit: contain;
            background: #000;
        }
        .card-name {
            font-size: 0.85rem;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-type {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 4px;
        }
        .card-type.member { background: #4CAF50; }
        .card-type.live { background: #2196F3; }
        .card-type.energy { background: #FF9800; }
        .card-count { font-size: 1.2rem; font-weight: bold; color: #ff6b9d; }
        .card-id { font-size: 0.65rem; color: #666; margin-top: 4px; }
    </style>
</head>
